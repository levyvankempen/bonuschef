version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: pg_supermarket
    ports:
      - "5455:5432"
    environment:
      POSTGRES_USER: supermarket
      POSTGRES_PASSWORD: supermarket
      POSTGRES_DB: supermarket
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
