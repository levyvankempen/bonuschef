apiVersion: v1
kind: Secret
metadata:
  name: bonuschef-secrets
  namespace: bonuschef
type: Opaque
data:
  # base64 encoded values — decode/encode with:
  #   echo -n "myvalue" | base64          (encode)
  #   echo "cG9zdGdyZXM=" | base64 -d    (decode)

  # "postgres"
  PG_PASSWORD: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: cG9zdGdyZXM=

  # Replace with your actual GitHub token:
  #   echo -n "ghp_xxxxxxxxxxxx" | base64
  GITHUB_TOKEN: Z2l0aHViX3BhdA==
