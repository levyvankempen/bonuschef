apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-daemon
  namespace: bonuschef
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster-daemon
  template:
    metadata:
      labels:
        app: dagster-daemon
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U postgres; do echo "waiting for postgres..."; sleep 2; done
      containers:
        - name: dagster-daemon
          image: bonuschef:latest
          imagePullPolicy: Never
          command: [uv, run, dagster-daemon, run, -m, bonuschef.dags.definitions]
          envFrom:
            - configMapRef:
                name: bonuschef-config
            - secretRef:
                name: bonuschef-secrets
          volumeMounts:
            - name: dagster-home
              mountPath: /app/dagster_home
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: dagster-home
          persistentVolumeClaim:
            claimName: dagster-home
