version: 2

models:
  - name: stg_portal__recipes
    description: "Staging model for portal-managed recipes."
    columns:
      - name: recipe_id
        description: "Unique ID of the recipe."
        tests:
          - unique
          - not_null
      - name: recipe_name
        description: "Name of the recipe."
        tests:
          - not_null
      - name: servings
        description: "Number of people the recipe serves."
        tests:
          - not_null

  - name: stg_portal__recipe_ingredients
    description: "Staging model for recipe ingredients with SCD2 validity windows for product succession."
    columns:
      - name: recipe_id
        description: "ID of the recipe this ingredient belongs to."
        tests:
          - not_null
      - name: product_name
        description: "Display name of the product ingredient."
        tests:
          - not_null
      - name: product_link
        description: "Link slug to the product on the Albert Heijn website."
        tests:
          - not_null
      - name: quantity
        description: "Number of units needed of this ingredient."
        tests:
          - not_null
      - name: valid_from
        description: "Start of validity window (NULL means from the beginning)."
      - name: valid_to
        description: "End of validity window (NULL means still active)."

  - name: stg_portal__product_images
    description: "Staging model for scraped product image URLs."
    columns:
      - name: product_link
        description: "Link slug of the product (natural key)."
        tests:
          - unique
          - not_null
      - name: image_url
        description: "URL of the product image scraped from Albert Heijn."
        tests:
          - not_null
