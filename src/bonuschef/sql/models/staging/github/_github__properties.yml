version: 2

models:
  - name: stg_github__products
    description: "Staging model for GitHub products, renaming raw columns to readable names."
    columns:
      - name: product_name
        description: "The name of the product."
        tests:
          - not_null
      - name: product_link
        description: "The link slug of the product (e.g. wi453733/ah-tortilla-wraps)."
        tests:
          - not_null
      - name: price
        description: "The price of the product in euros."
        tests:
          - not_null
      - name: amount
        description: "The volume or size description of the product."
      - name: sha
        description: "The git commit SHA used to retrieve the data."
        tests:
          - not_null
      - name: snapshot_timestamp
        description: "Timestamp of the snapshot (commit author date)."
        tests:
          - not_null
