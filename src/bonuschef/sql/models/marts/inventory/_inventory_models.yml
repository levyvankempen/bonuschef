version: 2

models:
  - name: dim_product
    description: "Product dimension with latest known attributes."
    columns:
      - name: product_link
        description: "Link slug of the product (natural key)."
        tests:
          - unique
          - not_null
      - name: product_url
        description: "Full Albert Heijn product URL."
        tests:
          - not_null
      - name: product_name
        description: "Name of the product."
        tests:
          - not_null
      - name: amount
        description: "The volume or size description of the product."
      - name: image_url
        description: "URL of the product image scraped from Albert Heijn (NULL if not yet scraped)."

  - name: fct_products
    description: "Historical price snapshots for all products across all ingested weeks."
    columns:
      - name: product_link
        description: "Link slug of the product."
        tests:
          - not_null
      - name: price
        description: "Price of the product at the snapshot moment."
        tests:
          - not_null
      - name: snapshot_sha
        description: "The git commit SHA of the snapshot."
      - name: snapshot_timestamp
        description: "Timestamp of the price snapshot."
        tests:
          - not_null

  - name: fct_product_price_changes
    description: "Price changes between consecutive snapshots for each product."
    columns:
      - name: product_link
        description: "Link slug of the product."
        tests:
          - not_null
      - name: product_name
        description: "Name of the product."
      - name: prev_snapshot_timestamp
        description: "Timestamp of the previous price snapshot."
      - name: snapshot_timestamp
        description: "Timestamp when the price changed."
        tests:
          - not_null
      - name: prev_price
        description: "Price before the change."
      - name: new_price
        description: "Price after the change."
      - name: price_change
        description: "Absolute price difference (new - old)."
      - name: pct_change
        description: "Percentage price change."

  - name: fct_bonus_price_comparison
    description: "Comparison of tracked product prices with AH bonus prices to detect price inflation."
    columns:
      - name: product_link
        description: "Link slug of the product."
        tests:
          - not_null
      - name: product_name
        description: "Name of the product."
      - name: tracked_price
        description: "Latest tracked price from the GitHub source."
      - name: ah_price
        description: "AH's claimed regular price before the bonus (price_before_bonus)."
      - name: bonus_price
        description: "Current discounted bonus price."
      - name: bonus_mechanism
        description: "The bonus type (e.g., '25% korting', '2 VOOR 5.50')."
      - name: bonus_start_date
        description: "Start date of the bonus period."
      - name: bonus_end_date
        description: "End date of the bonus period."
      - name: price_inflation
        description: "How much AH inflated the before price above tracked price (ah_price - tracked_price)."
      - name: real_savings
        description: "Actual savings vs tracked price (tracked_price - bonus_price)."
      - name: advertised_savings
        description: "Savings AH claims (ah_price - bonus_price)."
      - name: is_inflated
        description: "Whether AH's before price exceeds the tracked price."
