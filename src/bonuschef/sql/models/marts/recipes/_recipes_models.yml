version: 2
models:
  - name: dim_recipe
    description: Recipes with their items and servings
    columns:
      - name: recipe_id
        description: ID of the recipe.
      - name: recipe_name
        description: Name of the recipe.
      - name: servings
        description: Amount of people the recipe can serve.
      - name: product_name
        description: Name of the recipe.
      - name: product_link
        description: Link to the webpage of the product.
      - name: quantity
        description: Amount needed of the ingredient.
  - name: fct_recipe_cost_latest
    description: Price of the recipes grouped
    columns:
      - name: recipe_id
        description: ID of the recipe.
      - name: recipe_name
        description: Name of the recipe.
      - name: servings
        description: Amount of people the recipe can serve.
      - name: total_cost
        description: Total cost of the recipe.
      - name: cost_per_serving
        description: Cost of the recipe calculated per serving.