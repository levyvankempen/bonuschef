version: 2

models:
  - name: dim_recipe
    description: "Recipe dimension table."
    columns:
      - name: recipe_id
        description: "Unique ID of the recipe."
        tests:
          - unique
          - not_null
      - name: recipe_name
        description: "Name of the recipe."
        tests:
          - not_null
      - name: servings
        description: "Number of people the recipe serves."
        tests:
          - not_null

  - name: fct_recipe_cost_latest
    description: "Current total cost per recipe based on latest product prices."
    columns:
      - name: recipe_id
        description: "ID of the recipe."
        tests:
          - unique
          - not_null
      - name: recipe_name
        description: "Name of the recipe."
      - name: servings
        description: "Number of people the recipe serves."
      - name: total_cost
        description: "Total cost of all ingredients at latest prices."
      - name: cost_per_serving
        description: "Total cost divided by number of servings."

  - name: fct_recipe_cost_history
    description: "Historical recipe cost per snapshot, with SCD2-aware ingredient selection and price coverage tracking."
    columns:
      - name: recipe_id
        description: "ID of the recipe."
        tests:
          - not_null
      - name: recipe_name
        description: "Name of the recipe."
      - name: servings
        description: "Number of people the recipe serves."
      - name: snapshot_timestamp
        description: "Timestamp of the price snapshot."
        tests:
          - not_null
      - name: total_cost_observed
        description: "Sum of item costs for ingredients valid at this snapshot that had a price."
      - name: price_coverage
        description: "Fraction of valid recipe items that had a price (0.0 to 1.0)."
      - name: cost_per_serving_strict
        description: "Cost per serving, only calculated when all valid items have prices."

  - name: fct_recipe_cost_breakdown
    description: "Current recipe ingredient cost breakdown with percentage of total."
    columns:
      - name: recipe_id
        description: "ID of the recipe."
        tests:
          - not_null
      - name: recipe_name
        description: "Name of the recipe."
      - name: product_name
        description: "Display name of the ingredient product."
      - name: product_link
        description: "Link slug of the ingredient product."
        tests:
          - not_null
      - name: quantity
        description: "Number of units needed."
      - name: price
        description: "Latest unit price of the product."
      - name: item_cost
        description: "Total cost of this ingredient (price x quantity)."
      - name: cost_pct
        description: "Percentage of total recipe cost this ingredient represents."

  - name: fct_recipe_cost_breakdown_bonus
    description: "Recipe ingredient cost breakdown enriched with current AH bonus data."
    columns:
      - name: recipe_id
        description: "ID of the recipe."
        tests:
          - not_null
      - name: recipe_name
        description: "Name of the recipe."
      - name: product_name
        description: "Display name of the ingredient product."
      - name: product_link
        description: "Link slug of the ingredient product."
        tests:
          - not_null
      - name: quantity
        description: "Number of units needed."
      - name: price
        description: "Latest unit price of the product."
      - name: item_cost
        description: "Total cost of this ingredient (price x quantity)."
      - name: cost_pct
        description: "Percentage of total recipe cost this ingredient represents."
      - name: is_on_bonus
        description: "Whether this ingredient is currently on bonus at Albert Heijn."
      - name: bonus_mechanism
        description: "The bonus type (e.g., '25% korting', '2 VOOR 5.50')."
      - name: bonus_start_date
        description: "Start date of the bonus period."
      - name: bonus_end_date
        description: "End date of the bonus period."
      - name: price_before_bonus
        description: "Regular price before the bonus."
      - name: bonus_price
        description: "Current discounted price."
      - name: advertised_savings
        description: "Savings AH claims: (price_before_bonus - bonus_price) * quantity. May be inflated."
      - name: real_savings
        description: "Actual savings vs tracked price: (price - bonus_price) * quantity."
