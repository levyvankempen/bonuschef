name: CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  nox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      # Install uv (official action)
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Optional: ensure a specific Python is available for nox "python=['3.12']"
      - name: Install Python 3.12
        run: uv python install 3.12

      # Show nox (via uvx)
      - name: nox --version
        run: uvx nox --version

      # Lint Python (Ruff)
      - name: nox -s lint_python
        run: uvx nox -s lint_python -- --output-format=github

      # Lint SQL (sqlfluff + your dbt parse step)
      - name: nox -s lint_sql
        run: uvx nox -s lint_sql

      # Tests
      - name: nox -s tests
        run: uvx nox -s tests
